interface:
  display_name: "vLLM 课程总纲"
  short_description: "生成中文 vLLM 单课单主题主课程、专题高阶课程与母版总纲"
  default_prompt: "使用 $vllm-course-outline 生成中文 vLLM 课程目录或课程总纲；默认采用“第1课-...”的课时标题格式，并遵守“同一课只讲一个重要主题”的规则。标准版主课程默认按 15 节组织，每节课都必须有具体模块、链路、接口或运行能力作为主体，并优先按 `模型初始化 -> 请求提交 -> engine client -> engine core -> scheduler -> continuous batching / chunked prefill -> worker/executor -> model runner -> kv cache / prefix caching / paged attention -> sampling / output` 的执行流组织；`项目定位`、`版本演进`、`配置体系`、`服务入口层`、`输入处理与请求封装`、`核心数据对象`、`源码阅读路径` 默认并入相邻功能课或附录，不单独占课；`EngineCoreRequest 预处理与入队` 与 `RequestOutput 聚合与流式返回` 如果进入主课程，优先合并到 `EngineClient 请求提交与输出回收` 一课；`LoRA / Multi-LoRA` 与 `多模态处理` 默认下放到专题高阶课程，不占标准版主课程课时；`Continuous Batching`、`Chunked Prefill`、`Prefix Caching` 与 `PagedAttention` 已提升到标准版主课程，相关专题营中不再重复保留；如果标题只有导论性质的 `定位`、`演进`、`概览`、`入口`，或者只有泛化的 `消息流`、`Serving`、`调优` 而没有落实到具体通信机制、请求对象、入队路径、输出对象或 profiling 手段，通常不应单独进入主课程。主课程优先保持主线连贯，过多主题默认拆到专题高阶课程；如果用户要求 20 节左右课程，默认使用“主课程 + 专题营”组合而不是把多个主题压回单一主课；主课程与专题营之间不得重复独立课时。覆盖项目总览、架构、chunked prefill、分布式并行、offloading、PD 分离、attention backend、structured outputs、工具调用和重要模型结构。如果用户要求最新版本，则先核对官方 release。"
