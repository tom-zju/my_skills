interface:
  display_name: "vLLM 课程总纲"
  short_description: "生成中文 vLLM 单课单主题主课程、专题高阶课程与母版总纲"
  default_prompt: "使用 $vllm-course-outline 生成中文 vLLM 课程目录或课程总纲；默认采用“第1课-...”的课时标题格式，并遵守“同一课只讲一个重要主题”的规则。默认先输出 `15 节标准版主课程`，主课程只保留 vLLM 强链路主线与核心运行时，并优先按 `模型初始化 -> 请求提交 -> engine client -> engine core -> scheduler -> continuous batching / chunked prefill -> worker/executor -> model runner -> kv cache / prefix caching / paged attention -> sampling / output` 的执行流组织。`项目定位`、`版本演进`、`配置体系`、`服务入口层`、`输入处理与请求封装`、`核心数据对象`、`源码阅读路径` 默认并入相邻功能课或附录，不单独占课；`EngineCoreRequest 预处理与入队` 与 `RequestOutput 聚合与流式返回` 如果进入主课程，优先合并到 `EngineClient 请求提交与输出回收` 一课；`LoRA / Multi-LoRA`、`多模态处理`、`分布式并行`、`offloading`、`PD 分离`、`attention backend`、`structured outputs`、`工具调用`、`重要模型结构` 默认下放到专题高阶课程，只有用户明确要求深度版、20 节左右课程或指定某个专题时，才在主课程后追加专题营。主课程与专题营之间不得重复独立课时。如果用户要求最新版本或指定版本，则先核对官方 release，并在输出中显式写明版本号与官方发布日期。"
