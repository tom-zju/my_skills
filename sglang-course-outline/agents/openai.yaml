interface:
  display_name: "SGLang 课程总纲"
  short_description: "生成中文 SGLang 课程总纲、课程目录、知识地图与学习路径"
  default_prompt: "使用 $sglang-course-outline 生成中文 SGLang 课程目录或课程总纲；默认采用“第1课-...”的课时标题格式。标准版主课程默认按 19 节组织，并优先按 `介绍与快速上手 -> 架构与入口 -> 请求进入 -> tokenizer / scheduler -> schedule batch -> continuous batching / chunked prefill -> radix attention / prefix reuse -> worker / model runner -> attention backend -> parallelism overview / detail -> speculative decoding -> quantization basics / practice -> disaggregation / hicache` 的执行流组织。第1课默认写为 `SGLang 介绍、环境搭建与快速上手`；并行部分默认写为 `第13课-SGLang 并行体系总览（TP / DP / SP / PP / EP）` 与 `第14课-SGLang 并行机制细讲（TP / DP / DPA / DP Router / SP / EP / PP）` 两课；量化部分默认写为 `Quantization 基础与原理` 和 `Quantization 模块解析与实践` 两课。专题高阶课程默认聚焦 `DeepSeek / Kimi / Qwen 模型结构`、`LLM 长文本优化专题营（三课：问题定义与背景、优化点与解决方案、工程落地与排障补充）`、`LLM 模型性能优化端到端专题营（三课：SGLang 性能优化流程、Profiling 与瓶颈定位、关键专项与实战补充）`。如果用户要求一份详细的 SGLang 课程大纲，默认同时输出 `标准版主课程 + 专题高阶课程` 的 Markdown 文档，并为每一课补充 `课程主题`、`为什么重要`、`核心知识点`、`学习目标`、`推荐阅读文件资料`，其中阅读资料应尽量附真实可靠的官方文档链接或官方仓库链接。如果用户要求最新版本或最新代码，先核对 SGLang 官方 release/tag 与主仓库代码。"
